# conda env for the 0D ER-PM model and the sensitivity analysis.
#   conda env create -f environment.yml
#   conda activate erpm
#
# Note: the spatial SMART/FEM model (model.* paths that import dolfin/smart)
# needs a legacy FEniCS + SMART install and is not covered here.

name: erpm
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy>=2.0
  - scipy>=1.13
  - sympy>=1.13
  - matplotlib>=3.8
  - salib>=1.5        # sensitivity_analysis only
  - joblib>=1.3       # sensitivity_analysis only
